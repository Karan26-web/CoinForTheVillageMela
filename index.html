<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Money Meter</title>
    <link rel="stylesheet" href="styles.css?v=49" />
  </head>
  <body>
    <div class="page-shell is-selection-view">
      <div class="page-background" aria-hidden="true"></div>

      <main class="game-shell">
        <section class="play-surface" aria-labelledby="gameTitle">
          <header class="top-banner">
            <img
              class="top-banner__image"
              src="assets/banner.png"
              alt=""
              aria-hidden="true"
            />

            <div class="top-banner__copy">
              <h1 id="gameTitle">Welcome to the Carnival Coins!</h1>
            </div>
          </header>

          <p class="sr-only" id="statusMessage" aria-live="polite">
            Choose a ride to start the next level.
          </p>

          <section class="selection-screen" id="selectionScreen" aria-label="Ride levels">
            <div class="selection-panel">
              <h2 class="sr-only" id="selectionTitle">Choose a carnival ride</h2>
              <div class="ride-list" id="rideList" role="list"></div>
            </div>
          </section>

          <section
            class="game-screen"
            id="gameScreen"
            aria-labelledby="gameTitle levelName"
            hidden
          >
            <h2 class="sr-only" id="levelName">Merry-Go-Round</h2>

            <div class="level-actions">
              <button
                class="action-button action-button--secondary action-button--back"
                type="button"
                id="backButton"
                aria-label="Back"
              >
                <span class="action-button__arrow" aria-hidden="true">&#8592;</span>
                <span class="sr-only">Back</span>
              </button>
            </div>

            <div class="board-layout">
              <section class="machine-column" aria-label="Money meter machine">
                <div class="machine-wrap">
                  <div class="machine-goal" id="machineGoal" aria-hidden="true">₹0</div>

                  <img
                    id="machineImage"
                    class="machine-image machine-image--base"
                    src="assets/RealMAchine.png"
                    alt="Money meter machine"
                  />

                  <div class="machine-total" id="machineTotal" aria-live="polite">
                    ₹0
                  </div>

                  <div
                    class="machine-meter"
                    id="machineMeter"
                    role="meter"
                    aria-valuemin="0"
                    aria-valuemax="10"
                    aria-valuenow="0"
                    aria-labelledby="gameTitle levelName"
                  >
                    <div class="machine-meter__fill" id="meterFill"></div>
                    <div class="machine-meter__shine"></div>
                  </div>

                  <div class="ticket-bay" aria-hidden="true">
                    <div class="ticket-prize">
                      <img
                        class="ticket-prize__image"
                        src="assets/ticket.png"
                        alt=""
                        aria-hidden="true"
                      />
                      <span class="ticket-prize__text">TICKET</span>
                    </div>
                  </div>

                  <div
                    class="confetti-layer"
                    id="confettiLayer"
                    aria-hidden="true"
                  ></div>
                </div>
              </section>

              <section class="controls-column">
                <section class="drop-panel" aria-label="Drop money here">
                  <div
                    class="machine-dropzone"
                    id="machineDropZone"
                    aria-label="Drop money into the machine"
                  >
                    <p class="machine-dropzone__hint" id="dropZoneHint">
                      Drag and Drop here
                    </p>
                    <div
                      class="placed-money-layer"
                      id="placedMoneyLayer"
                      aria-hidden="true"
                    ></div>
                    <button
                      class="undo-button"
                      type="button"
                      id="undoButton"
                      aria-label="Undo last drop"
                    >
                      <img
                        class="undo-button__image"
                        src="assets/UNdobutton.png"
                        alt=""
                        aria-hidden="true"
                      />
                      <span class="sr-only">Undo</span>
                    </button>
                  </div>
                </section>

                <section class="controls-panel" aria-label="Choose a denomination">
                  <div class="money-tray">
                    <button
                      class="money-button money-button--coin"
                      type="button"
                      data-value="1"
                      data-money-kind="coin-1"
                      aria-label="₹1 coin"
                      draggable="true"
                    >
                      <img
                        class="money-sprite money-sprite--coin"
                        src="assets/₹1.png"
                        alt=""
                        aria-hidden="true"
                      />
                    </button>

                    <button
                      class="money-button money-button--coin"
                      type="button"
                      data-value="2"
                      data-money-kind="coin-2"
                      aria-label="₹2 coin"
                      draggable="true"
                    >
                      <img
                        class="money-sprite money-sprite--coin"
                        src="assets/₹2.png"
                        alt=""
                        aria-hidden="true"
                      />
                    </button>

                    <button
                      class="money-button money-button--coin"
                      type="button"
                      data-value="5"
                      data-money-kind="coin-5"
                      aria-label="₹5 coin"
                      draggable="true"
                    >
                      <img
                        class="money-sprite money-sprite--coin"
                        src="assets/₹5.png"
                        alt=""
                        aria-hidden="true"
                      />
                    </button>

                    <button
                      class="money-button money-button--coin money-button--ten"
                      type="button"
                      data-value="10"
                      data-money-kind="coin-10"
                      aria-label="₹10 coin"
                      draggable="true"
                    >
                      <img
                        class="money-sprite money-sprite--decor"
                        src="assets/₹10Coin.png"
                        alt=""
                        aria-hidden="true"
                      />
                    </button>

                    <button
                      class="money-button money-button--note"
                      type="button"
                      data-value="10"
                      data-money-kind="note-10"
                      aria-label="₹10 note"
                      draggable="true"
                    >
                      <img
                        class="money-sprite money-sprite--note"
                        src="assets/₹10Note.png"
                        alt=""
                        aria-hidden="true"
                      />
                    </button>

                    <button
                      class="money-button money-button--note money-button--note-wide"
                      type="button"
                      data-value="20"
                      data-money-kind="note-20"
                      aria-label="₹20 note"
                      draggable="true"
                    >
                      <img
                        class="money-sprite money-sprite--note"
                        src="assets/₹20.png"
                        alt=""
                        aria-hidden="true"
                      />
                    </button>
                  </div>
                </section>

                <p class="sr-only" id="selectionHint">
                  Drag or tap any denomination to begin.
                </p>
              </section>
            </div>

            <button
              class="check-button"
              type="button"
              id="checkButton"
              aria-label="Check"
            >
              <span
                class="check-button__label"
                id="checkButtonLabel"
                aria-hidden="true"
              ></span>
              <span class="sr-only">Check</span>
            </button>

            <div
              class="success-popup"
              id="successPopup"
              role="dialog"
              aria-modal="true"
              aria-labelledby="successPopupTitle"
              aria-describedby="successPopupSubtitle"
              aria-hidden="true"
            >
              <div class="success-popup__burst" aria-hidden="true">
                <span class="success-popup__spark success-popup__spark--1"></span>
                <span class="success-popup__spark success-popup__spark--2"></span>
                <span class="success-popup__spark success-popup__spark--3"></span>
                <span class="success-popup__spark success-popup__spark--4"></span>
                <span class="success-popup__spark success-popup__spark--5"></span>
                <span class="success-popup__spark success-popup__spark--6"></span>
              </div>

              <div class="success-popup__screen">
                <img
                  class="success-popup__image"
                  id="successPopupImage"
                  src=""
                  alt=""
                  decoding="async"
                />
                <div
                  class="success-popup__lighting success-popup__lighting--base"
                  aria-hidden="true"
                ></div>
                <div
                  class="success-popup__lighting success-popup__lighting--beam success-popup__lighting--beam-1"
                  aria-hidden="true"
                ></div>
                <div
                  class="success-popup__lighting success-popup__lighting--beam success-popup__lighting--beam-2"
                  aria-hidden="true"
                ></div>
                <div
                  class="success-popup__lighting success-popup__lighting--glow success-popup__lighting--glow-1"
                  aria-hidden="true"
                ></div>
                <div
                  class="success-popup__lighting success-popup__lighting--glow success-popup__lighting--glow-2"
                  aria-hidden="true"
                ></div>

                <div class="success-popup__caption">
                  <p class="success-popup__eyebrow">Ticket Unlocked</p>
                  <p class="success-popup__title" id="successPopupTitle">Great Job!</p>
                  <p class="success-popup__subtitle" id="successPopupSubtitle">
                    Your ticket is ready!
                  </p>
                </div>
              </div>
            </div>
          </section>
        </section>
      </main>
    </div>

    <script src="gameLogic.js?v=4"></script>
    <script src="script.js?v=33"></script>
  </body>
</html>

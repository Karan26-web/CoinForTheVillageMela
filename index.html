<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6c3412" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title id="documentTitle"></title>
    <link rel="manifest" href="site.webmanifest?v=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=81" />
  </head>
  <body>
    <div class="page-shell is-selection-view">
      <div class="page-background" aria-hidden="true"></div>

      <main class="game-shell">
        <section class="play-surface" aria-labelledby="gameTitle">
          <header class="top-banner">
            <img
              class="top-banner__image"
              src="assets/banner.png"
              alt=""
              aria-hidden="true"
            />

            <button
              class="language-toggle"
              type="button"
              id="languageToggle"
              aria-label=""
            >
              <span class="language-toggle__option" id="languageToggleEnglish">English</span>
              <span class="language-toggle__divider" aria-hidden="true">|</span>
              <span class="language-toggle__option" id="languageToggleHindi">हिंदी</span>
            </button>

            <div class="top-banner__copy">
              <h1 id="gameTitle"></h1>
            </div>
          </header>

          <p class="sr-only" id="statusMessage" aria-live="polite"></p>

          <section class="selection-screen" id="selectionScreen">
            <div class="selection-panel">
              <h2 class="sr-only" id="selectionTitle"></h2>
              <div class="ride-list" id="rideList" role="list"></div>
            </div>
          </section>

          <section
            class="game-screen"
            id="gameScreen"
            aria-labelledby="gameTitle levelName"
            hidden
          >
            <h2 class="sr-only" id="levelName"></h2>

            <div class="level-actions">
              <button
                class="action-button action-button--secondary action-button--back"
                type="button"
                id="backButton"
                aria-label=""
              >
                <span class="action-button__arrow" aria-hidden="true">&#8592;</span>
                <span class="sr-only" id="backButtonText"></span>
              </button>
            </div>

            <div class="board-layout">
              <section class="machine-column" id="machineColumn">
                <div class="machine-wrap">
                  <div class="machine-goal" id="machineGoal" aria-hidden="true">₹0</div>

                  <img
                    id="machineImage"
                    class="machine-image machine-image--base"
                    src="assets/RealMAchine.png"
                    alt=""
                  />

                  <div class="machine-total" id="machineTotal" aria-live="polite">
                    ₹0
                  </div>

                  <div
                    class="machine-meter"
                    id="machineMeter"
                    role="meter"
                    aria-valuemin="0"
                    aria-valuemax="10"
                    aria-valuenow="0"
                    aria-labelledby="gameTitle levelName"
                  >
                    <div class="machine-meter__fill" id="meterFill"></div>
                    <div class="machine-meter__shine"></div>
                  </div>

                  <div class="ticket-bay" aria-hidden="true">
                    <div class="ticket-prize">
                      <img
                        class="ticket-prize__image"
                        src="assets/ticket.png"
                        alt=""
                        aria-hidden="true"
                      />
                      <span class="ticket-prize__text" id="ticketPrizeText"></span>
                    </div>
                  </div>

                </div>
              </section>

              <section class="controls-column">
                <section class="drop-panel" id="dropPanel">
                  <div
                    class="machine-dropzone"
                    id="machineDropZone"
                    aria-label=""
                  >
                    <p class="machine-dropzone__hint" id="dropZoneHint"></p>
                    <div
                      class="placed-money-layer"
                      id="placedMoneyLayer"
                      aria-hidden="true"
                    ></div>
                    <button
                      class="undo-button"
                      type="button"
                      id="undoButton"
                      aria-label=""
                    >
                      <img
                        class="undo-button__image"
                        src="assets/UNdobutton.png"
                        alt=""
                        aria-hidden="true"
                      />
                      <span class="sr-only" id="undoButtonText"></span>
                    </button>
                  </div>
                </section>

                <section class="controls-panel" id="controlsPanel">
                  <div class="money-tray">
                    <button
                      class="money-button money-button--coin"
                      type="button"
                      data-value="1"
                      data-money-kind="coin-1"
                      aria-label=""
                      draggable="true"
                    >
                      <img
                        class="money-sprite money-sprite--coin"
                        src="assets/1.png"
                        alt=""
                        aria-hidden="true"
                      />
                    </button>

                    <button
                      class="money-button money-button--coin"
                      type="button"
                      data-value="2"
                      data-money-kind="coin-2"
                      aria-label=""
                      draggable="true"
                    >
                      <img
                        class="money-sprite money-sprite--coin"
                        src="assets/2.png"
                        alt=""
                        aria-hidden="true"
                      />
                    </button>

                    <button
                      class="money-button money-button--coin"
                      type="button"
                      data-value="5"
                      data-money-kind="coin-5"
                      aria-label=""
                      draggable="true"
                    >
                      <img
                        class="money-sprite money-sprite--coin"
                        src="assets/5.png"
                        alt=""
                        aria-hidden="true"
                      />
                    </button>

                    <button
                      class="money-button money-button--coin money-button--ten"
                      type="button"
                      data-value="10"
                      data-money-kind="coin-10"
                      aria-label=""
                      draggable="true"
                    >
                      <img
                        class="money-sprite money-sprite--decor"
                        src="assets/10Coin.png"
                        alt=""
                        aria-hidden="true"
                      />
                    </button>

                    <button
                      class="money-button money-button--note"
                      type="button"
                      data-value="10"
                      data-money-kind="note-10"
                      aria-label=""
                      draggable="true"
                    >
                      <img
                        class="money-sprite money-sprite--note"
                        src="assets/10Note.png"
                        alt=""
                        aria-hidden="true"
                      />
                    </button>

                    <button
                      class="money-button money-button--note money-button--note-wide"
                      type="button"
                      data-value="20"
                      data-money-kind="note-20"
                      aria-label=""
                      draggable="true"
                    >
                      <img
                        class="money-sprite money-sprite--note"
                        src="assets/20.png"
                        alt=""
                        aria-hidden="true"
                      />
                    </button>
                  </div>
                </section>

                <p class="sr-only" id="selectionHint"></p>
              </section>
            </div>

            <button
              class="check-button"
              type="button"
              id="checkButton"
              aria-label=""
            >
              <span
                class="check-button__label"
                id="checkButtonLabel"
                aria-hidden="true"
              ></span>
              <span class="sr-only" id="checkButtonSrText"></span>
            </button>

            <div
              class="success-popup"
              id="successPopup"
              role="dialog"
              aria-modal="true"
              aria-labelledby="successPopupTitle"
              aria-describedby="successPopupSubtitle"
              aria-hidden="true"
            >
              <div class="success-popup__screen">
                <img
                  class="success-popup__image"
                  id="successPopupImage"
                  src=""
                  alt=""
                  decoding="async"
                />
                <div class="success-popup__caption">
                  <p class="success-popup__eyebrow" id="successPopupEyebrow"></p>
                  <p class="success-popup__title" id="successPopupTitle"></p>
                  <p class="success-popup__subtitle" id="successPopupSubtitle"></p>
                </div>
              </div>
            </div>
          </section>
        </section>
      </main>

      <div
        class="confetti-layer"
        id="confettiLayer"
        aria-hidden="true"
      ></div>
    </div>

    <div
      class="landscape-lock"
      id="landscapeLock"
      aria-hidden="true"
      aria-live="assertive"
    >
      <div
        class="landscape-lock__panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="landscapeLockTitle"
        aria-describedby="landscapeLockMessage"
      >
        <div class="landscape-lock__device" aria-hidden="true"></div>
        <h2 class="landscape-lock__title" id="landscapeLockTitle"></h2>
        <p class="landscape-lock__message" id="landscapeLockMessage"></p>
      </div>
    </div>
